services:
  scrinium:
    build:
      context: .
      dockerfile: Containerfile
    image: scrinium:latest
    container_name: scrinium
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SCRINIUM_SITE_NAME: ${SCRINIUM_SITE_NAME:-Scrinium}
      SCRINIUM_TRUST_PROXY: ${SCRINIUM_TRUST_PROXY:-1}
      SCRINIUM_HTTPS_ONLY: ${SCRINIUM_HTTPS_ONLY:-1}
    volumes:
      - ./data:/data:Z

  nginx:
    image: docker.io/library/nginx:alpine
    container_name: scrinium-nginx
    restart: unless-stopped
    depends_on:
      - scrinium
    ports:
      - "${SCRINIUM_HTTP_PORT:-8080}:80"
      - "${SCRINIUM_HTTPS_PORT:-8443}:443"
    environment:
      SCRINIUM_DOMAIN: ${SCRINIUM_DOMAIN:-localhost}
      SCRINIUM_TLS_CERT: ${SCRINIUM_TLS_CERT:-/etc/ssl/scrinium/fullchain.pem}
      SCRINIUM_TLS_KEY: ${SCRINIUM_TLS_KEY:-/etc/ssl/scrinium/privkey.pem}
    volumes:
      - ./nginx/scrinium.conf.template:/etc/nginx/templates/scrinium.conf.template:ro,Z
      - ${SCRINIUM_TLS_HOST_DIR:-./nginx/certs}:/etc/ssl/scrinium:ro
